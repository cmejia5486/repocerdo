name: AI Requirements Audit (Excel)

on:
  workflow_call:
    secrets:
      OPENAI_API_KEY:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

permissions:
  contents: read
  actions: write

jobs:
  ai_requirements_excel:
    name: AI audit -> security_audit_requirements.xlsx
    runs-on: self-hosted
    timeout-minutes: 600
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_TASK: ai_requirements_excel
      AI_PROFILE: ${{ vars.AI_PROFILE }}
      AI_PYTHON_VERSION: ${{ vars.AI_PYTHON_VERSION }}
      AI_RUNTIME_DEBUG: ${{ vars.AI_RUNTIME_DEBUG }}

      # Cross-platform runtime paths. These work on Windows, Linux and macOS runners.
      VISION360_DATA_DIR: ${{ runner.temp }}/vision360-data
      VISION360_BUNDLE_DIR: ${{ runner.temp }}/vision360-bundle
      VISION360_FINGERPRINT_PATH: ${{ runner.temp }}/vision360-data/vision360_fingerprint.json
      REQUISITES_PATH: ${{ runner.temp }}/vision360-data/requisites.json
      SECURITY_AUDIT_XLSX_PATH: ${{ runner.temp }}/vision360-data/security_audit_requirements.xlsx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Python launcher on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          python --version
          python -c "import sys; print(sys.executable)"

          if (Get-Command py -ErrorAction SilentlyContinue) {
            py --list
          } else {
            Write-Host "Python launcher 'py' not found. The workflow will use python from PATH."
          }

      - name: Verify Python on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          if command -v python3 >/dev/null 2>&1; then
            python3 --version
            python3 -c "import sys; print(sys.executable)"
          elif command -v python >/dev/null 2>&1; then
            python --version
            python -c "import sys; print(sys.executable)"
          else
            echo "Python is not available in PATH."
            exit 1
          fi

      - name: Create clean venv on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path ".venv") {
            Remove-Item -Recurse -Force ".venv"
          }

          $pythonVersion = ($env:AI_PYTHON_VERSION + "").Trim()

          if (-not [string]::IsNullOrWhiteSpace($pythonVersion) -and (Get-Command py -ErrorAction SilentlyContinue)) {
            Write-Host "Creating venv with Python $pythonVersion via Python launcher."
            py -$pythonVersion -m venv .venv
          } else {
            Write-Host "Creating venv with default python from PATH."
            python -m venv .venv
          }

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $pythonExe = Join-Path $PWD ".venv\Scripts\python.exe"
          & $pythonExe --version
          & $pythonExe -c "import sys; print(sys.executable)"

          "PYTHON_EXE=$pythonExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create clean venv on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .venv

          python_version="${AI_PYTHON_VERSION:-}"

          if [ -n "$python_version" ] && command -v "python$python_version" >/dev/null 2>&1; then
            echo "Creating venv with python$python_version."
            "python$python_version" -m venv .venv
          elif command -v python3 >/dev/null 2>&1; then
            echo "Creating venv with python3."
            python3 -m venv .venv
          else
            echo "Creating venv with python."
            python -m venv .venv
          fi

          python_exe="$PWD/.venv/bin/python"
          "$python_exe" --version
          "$python_exe" -c "import sys; print(sys.executable)"

          echo "PYTHON_EXE=$python_exe" >> "$GITHUB_ENV"

      - name: Install dependencies on Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          $ErrorActionPreference = "Stop"

          function Invoke-Pip {
            param(
              [Parameter(Mandatory = $true)]
              [string[]] $ArgsToPass,
              [int] $MaxAttempts = 3
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              Write-Host "[PIP] Attempt $attempt/$MaxAttempts: python -m pip $($ArgsToPass -join ' ')"
              & $env:PYTHON_EXE -m pip @ArgsToPass

              if ($LASTEXITCODE -eq 0) {
                return
              }

              if ($attempt -lt $MaxAttempts) {
                $sleepSeconds = 10 * $attempt
                Write-Host "[PIP] Attempt failed. Retrying in $sleepSeconds seconds..."
                Start-Sleep -Seconds $sleepSeconds
              }
            }

            throw "pip failed after $MaxAttempts attempts: $($ArgsToPass -join ' ')"
          }

          Invoke-Pip -ArgsToPass @("--retries", "10", "--timeout", "120", "install", "--upgrade", "pip")
          Invoke-Pip -ArgsToPass @("--retries", "10", "--timeout", "120", "install", "--prefer-binary", "--force-reinstall", "-r", "requirements/ai-runtime.txt")

          & $env:PYTHON_EXE -m pip check
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Install dependencies on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          set -euo pipefail

          pip_retry() {
            max_attempts=3
            attempt=1

            until "$PYTHON_EXE" -m pip "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "pip failed after $max_attempts attempts: $*"
                return 1
              fi

              sleep_seconds=$((10 * attempt))
              echo "[PIP] Attempt $attempt failed. Retrying in $sleep_seconds seconds..."
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          pip_retry --retries 10 --timeout 120 install --upgrade pip
          pip_retry --retries 10 --timeout 120 install --prefer-binary --force-reinstall -r requirements/ai-runtime.txt

          "$PYTHON_EXE" -m pip check

      - name: Verify AI imports on Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path "scripts/openai") {
            throw "Local package scripts/openai shadows the real OpenAI SDK. Remove scripts/openai to use provider-based AIRuntime correctly."
          }

          $py = @'
          import sys
          import importlib.util
          import openai
          import litellm

          print("python:", sys.executable)
          print("openai version:", getattr(openai, "__version__", "unknown"))
          print("openai file:", getattr(openai, "__file__", "unknown"))
          print("openai._models spec:", importlib.util.find_spec("openai._models"))
          print("litellm version:", getattr(litellm, "__version__", "unknown"))
          print("litellm file:", getattr(litellm, "__file__", "unknown"))

          if importlib.util.find_spec("openai._models") is None:
              raise SystemExit("openai._models is not importable in this venv")
          '@

          $py | & $env:PYTHON_EXE -
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Verify AI imports on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          set -euo pipefail

          if [ -d "scripts/openai" ]; then
            echo "Local package scripts/openai shadows the real OpenAI SDK. Remove scripts/openai to use provider-based AIRuntime correctly."
            exit 1
          fi

          "$PYTHON_EXE" - <<'PY'
          import sys
          import importlib.util
          import openai
          import litellm

          print("python:", sys.executable)
          print("openai version:", getattr(openai, "__version__", "unknown"))
          print("openai file:", getattr(openai, "__file__", "unknown"))
          print("openai._models spec:", importlib.util.find_spec("openai._models"))
          print("litellm version:", getattr(litellm, "__version__", "unknown"))
          print("litellm file:", getattr(litellm, "__file__", "unknown"))

          if importlib.util.find_spec("openai._models") is None:
              raise SystemExit("openai._models is not importable in this venv")
          PY

      - name: Resolve AI config on Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          $ErrorActionPreference = "Stop"

          & $env:PYTHON_EXE scripts/resolve_ai_config.py --task "$env:AI_TASK" --github-env "$env:GITHUB_ENV"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Resolve AI config on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          set -euo pipefail
          "$PYTHON_EXE" scripts/resolve_ai_config.py --task "$AI_TASK" --github-env "$GITHUB_ENV"

      - name: Verify resolved AI route on Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "AI_PROFILE=$env:AI_PROFILE"
          Write-Host "AI_PROVIDER=$env:AI_PROVIDER"
          Write-Host "AI_MODEL=$env:AI_MODEL"
          Write-Host "AI_API_BASE=$env:AI_API_BASE"
          Write-Host "AI_BATCH_SIZE=$env:AI_BATCH_SIZE"
          Write-Host "AI_MAX_OUTPUT_TOKENS=$env:AI_MAX_OUTPUT_TOKENS"
          Write-Host "AI_TIMEOUT_S=$env:AI_TIMEOUT_S"
          Write-Host "AI_KEY_PRESENT=$env:AI_KEY_PRESENT"
          Write-Host "VISION360_DATA_DIR=$env:VISION360_DATA_DIR"
          Write-Host "SECURITY_AUDIT_XLSX_PATH=$env:SECURITY_AUDIT_XLSX_PATH"

          if ([string]::IsNullOrWhiteSpace($env:OPENAI_API_KEY)) {
            throw "OPENAI_API_KEY is empty."
          }

          if (-not [string]::IsNullOrWhiteSpace($env:AI_API_BASE)) {
            $modelsUrl = $env:AI_API_BASE.TrimEnd('/') + "/models"
            Write-Host "Testing AI endpoint from resolved configuration."

            $headers = @{}
            $headers["Authorization"] = "Bearer $env:OPENAI_API_KEY"

            Invoke-RestMethod -Uri $modelsUrl -Headers $headers -Method Get -TimeoutSec 30 | ConvertTo-Json -Depth 10
          } else {
            Write-Host "AI_API_BASE is empty. Assuming cloud provider or provider default endpoint. Skipping local /models check."
          }

      - name: Verify resolved AI route on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          set -euo pipefail

          echo "AI_PROFILE=${AI_PROFILE:-}"
          echo "AI_PROVIDER=${AI_PROVIDER:-}"
          echo "AI_MODEL=${AI_MODEL:-}"
          echo "AI_API_BASE=${AI_API_BASE:-}"
          echo "AI_BATCH_SIZE=${AI_BATCH_SIZE:-}"
          echo "AI_MAX_OUTPUT_TOKENS=${AI_MAX_OUTPUT_TOKENS:-}"
          echo "AI_TIMEOUT_S=${AI_TIMEOUT_S:-}"
          echo "AI_KEY_PRESENT=${AI_KEY_PRESENT:-}"
          echo "VISION360_DATA_DIR=${VISION360_DATA_DIR:-}"
          echo "SECURITY_AUDIT_XLSX_PATH=${SECURITY_AUDIT_XLSX_PATH:-}"

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY is empty."
            exit 1
          fi

          if [ -n "${AI_API_BASE:-}" ]; then
            echo "Testing AI endpoint from resolved configuration."
            "$PYTHON_EXE" - <<'PY'
          import json
          import os
          import urllib.request

          api_base = os.environ["AI_API_BASE"].rstrip("/")
          api_key = os.environ.get("OPENAI_API_KEY", "")
          req = urllib.request.Request(api_base + "/models")

          if api_key:
              req.add_header("Authorization", "Bearer " + api_key)

          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read().decode("utf-8", errors="replace"))

          print(json.dumps(data, indent=2, ensure_ascii=False))
          PY
          else
            echo "AI_API_BASE is empty. Assuming cloud provider or provider default endpoint. Skipping local /models check."
          fi

      - name: Verify AI runtime route on Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          $ErrorActionPreference = "Stop"

          $py = @'
          from lib.ai_runtime import AIRuntime, OpenAI, completion

          rt = AIRuntime(task="ai_requirements_excel")

          print("provider:", rt.provider)
          print("model:", rt.model)
          print("litellm_model:", rt.litellm_model)
          print("api_base:", rt.api_base)
          print("OpenAI available:", OpenAI is not None)
          print("LiteLLM completion available:", completion is not None)
          print("uses direct OpenAI:", rt._use_direct_openai())

          if rt.provider == "openai_compatible" and not rt._use_direct_openai():
              raise SystemExit("openai_compatible provider must use direct OpenAI SDK route")
          '@

          $env:PYTHONPATH = Join-Path $PWD "scripts"
          $py | & $env:PYTHON_EXE -
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Verify AI runtime route on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          set -euo pipefail

          PYTHONPATH="$PWD/scripts" "$PYTHON_EXE" - <<'PY'
          from lib.ai_runtime import AIRuntime, OpenAI, completion

          rt = AIRuntime(task="ai_requirements_excel")

          print("provider:", rt.provider)
          print("model:", rt.model)
          print("litellm_model:", rt.litellm_model)
          print("api_base:", rt.api_base)
          print("OpenAI available:", OpenAI is not None)
          print("LiteLLM completion available:", completion is not None)
          print("uses direct OpenAI:", rt._use_direct_openai())

          if rt.provider == "openai_compatible" and not rt._use_direct_openai():
              raise SystemExit("openai_compatible provider must use direct OpenAI SDK route")
          PY

      - name: Prepare data dir on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path $env:VISION360_DATA_DIR | Out-Null

          if (Test-Path $env:SECURITY_AUDIT_XLSX_PATH) {
            Remove-Item -Force $env:SECURITY_AUDIT_XLSX_PATH
          }

      - name: Prepare data dir on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$VISION360_DATA_DIR"
          rm -f "$SECURITY_AUDIT_XLSX_PATH"

      - name: Download VISION360 bundle artifact
        uses: actions/download-artifact@v6
        with:
          name: vision360-bundle
          path: ${{ env.VISION360_BUNDLE_DIR }}

      - name: Ensure inputs at portable paths on Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          $ErrorActionPreference = "Stop"

          $py = @'
          import json
          import os
          import shutil
          import sys
          import zipfile
          from pathlib import Path

          src = Path("requirements/requisites.json")
          if not src.is_file():
              raise SystemExit("requirements/requisites.json not found")

          requisites_path = Path(os.environ["REQUISITES_PATH"])
          requisites_path.parent.mkdir(parents=True, exist_ok=True)

          raw = src.read_text(encoding="utf-8", errors="replace")
          s = raw.lstrip()

          if s.startswith("{{"):
              raw = raw.replace("{{", "{", 1)

          data = json.loads(raw)

          if isinstance(data, dict) and isinstance(data.get("requirements"), list):
              data = data["requirements"]

          if not isinstance(data, list):
              print("requisites.json must be a JSON array.", file=sys.stderr)
              raise SystemExit(1)

          requisites_path.write_text(json.dumps(data, ensure_ascii=False), encoding="utf-8")

          bundle_dir = Path(os.environ["VISION360_BUNDLE_DIR"])
          data_dir = Path(os.environ["VISION360_DATA_DIR"])
          fingerprint_path = Path(os.environ["VISION360_FINGERPRINT_PATH"])
          fingerprint_path.parent.mkdir(parents=True, exist_ok=True)

          direct_fingerprint = bundle_dir / "vision360_fingerprint.json"
          bundle_zip = bundle_dir / "vision360_bundle.zip"

          if direct_fingerprint.is_file():
              shutil.copy2(direct_fingerprint, fingerprint_path)
          elif bundle_zip.is_file():
              with zipfile.ZipFile(bundle_zip) as zf:
                  zf.extractall(data_dir)
          else:
              raise SystemExit("vision360_fingerprint.json or vision360_bundle.zip not found in vision360-bundle.")

          if not fingerprint_path.is_file():
              extracted = data_dir / "vision360_fingerprint.json"
              if extracted.is_file():
                  shutil.copy2(extracted, fingerprint_path)

          if not fingerprint_path.is_file():
              raise SystemExit(f"vision360_fingerprint.json was not prepared at {fingerprint_path}")

          print(f"[OK] requisites -> {requisites_path}")
          print(f"[OK] fingerprint -> {fingerprint_path}")
          '@

          $py | & $env:PYTHON_EXE -
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Ensure inputs at portable paths on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          set -euo pipefail

          "$PYTHON_EXE" - <<'PY'
          import json
          import os
          import shutil
          import sys
          import zipfile
          from pathlib import Path

          src = Path("requirements/requisites.json")
          if not src.is_file():
              raise SystemExit("requirements/requisites.json not found")

          requisites_path = Path(os.environ["REQUISITES_PATH"])
          requisites_path.parent.mkdir(parents=True, exist_ok=True)

          raw = src.read_text(encoding="utf-8", errors="replace")
          s = raw.lstrip()

          if s.startswith("{{"):
              raw = raw.replace("{{", "{", 1)

          data = json.loads(raw)

          if isinstance(data, dict) and isinstance(data.get("requirements"), list):
              data = data["requirements"]

          if not isinstance(data, list):
              print("requisites.json must be a JSON array.", file=sys.stderr)
              raise SystemExit(1)

          requisites_path.write_text(json.dumps(data, ensure_ascii=False), encoding="utf-8")

          bundle_dir = Path(os.environ["VISION360_BUNDLE_DIR"])
          data_dir = Path(os.environ["VISION360_DATA_DIR"])
          fingerprint_path = Path(os.environ["VISION360_FINGERPRINT_PATH"])
          fingerprint_path.parent.mkdir(parents=True, exist_ok=True)

          direct_fingerprint = bundle_dir / "vision360_fingerprint.json"
          bundle_zip = bundle_dir / "vision360_bundle.zip"

          if direct_fingerprint.is_file():
              shutil.copy2(direct_fingerprint, fingerprint_path)
          elif bundle_zip.is_file():
              with zipfile.ZipFile(bundle_zip) as zf:
                  zf.extractall(data_dir)
          else:
              raise SystemExit("vision360_fingerprint.json or vision360_bundle.zip not found in vision360-bundle.")

          if not fingerprint_path.is_file():
              extracted = data_dir / "vision360_fingerprint.json"
              if extracted.is_file():
                  shutil.copy2(extracted, fingerprint_path)

          if not fingerprint_path.is_file():
              raise SystemExit(f"vision360_fingerprint.json was not prepared at {fingerprint_path}")

          print(f"[OK] requisites -> {requisites_path}")
          print(f"[OK] fingerprint -> {fingerprint_path}")
          PY

      - name: Run AI audit on Windows
        if: runner.os == 'Windows'
        env:
          USE_OPENAI_JUSTIFICATIONS: "1"
          STRICT_ENGLISH_OUTPUT: "1"
          TRANSLATE_REQUIREMENT_DESCRIPTIONS: "1"
          PYTHONNOUSERSITE: "1"
          PYTHONUNBUFFERED: "1"
          AI_RUNTIME_DEBUG: ${{ vars.AI_RUNTIME_DEBUG }}
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          & $env:PYTHON_EXE scripts/ai_security_audit_requirements_excel.py
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          if (-not (Test-Path $env:SECURITY_AUDIT_XLSX_PATH)) {
            throw "security_audit_requirements.xlsx was not created at $env:SECURITY_AUDIT_XLSX_PATH"
          }

      - name: Run AI audit on Unix
        if: runner.os != 'Windows'
        env:
          USE_OPENAI_JUSTIFICATIONS: "1"
          STRICT_ENGLISH_OUTPUT: "1"
          TRANSLATE_REQUIREMENT_DESCRIPTIONS: "1"
          PYTHONNOUSERSITE: "1"
          PYTHONUNBUFFERED: "1"
          AI_RUNTIME_DEBUG: ${{ vars.AI_RUNTIME_DEBUG }}
        shell: bash
        run: |
          set -euo pipefail

          "$PYTHON_EXE" scripts/ai_security_audit_requirements_excel.py
          test -f "$SECURITY_AUDIT_XLSX_PATH"

      - name: Upload Excel output
        uses: actions/upload-artifact@v6
        with:
          name: security-audit-excel
          if-no-files-found: error
          path: ${{ env.SECURITY_AUDIT_XLSX_PATH }}

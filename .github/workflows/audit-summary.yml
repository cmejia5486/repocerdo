name: Audit Summary

on:
  workflow_call:
    secrets:
      OPENAI_API_KEY:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

permissions:
  contents: read
  actions: write

jobs:
  audit_summary:
    name: Audit Summary -> DOCX PDF ZIP
    runs-on: self-hosted
    timeout-minutes: 180
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_TASK: audit_summary_docx
      AI_PROFILE: ${{ vars.AI_PROFILE }}
      AI_PYTHON_VERSION: ${{ vars.AI_PYTHON_VERSION }}
      AI_RUNTIME_DEBUG: ${{ vars.AI_RUNTIME_DEBUG }}
      PYTHONUNBUFFERED: "1"
      PYTHONNOUSERSITE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure portable paths on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $dataDir = Join-Path $env:RUNNER_TEMP "vision360-data"
          $auditExcelPath = Join-Path $dataDir "security_audit_requirements.xlsx"
          $analysisJsonPath = Join-Path $dataDir "audit_summary_analysis_pack.json"
          $docxPath = Join-Path $dataDir "Audit Summary.docx"
          $pdfPath = Join-Path $dataDir "Audit Summary.pdf"
          $zipPath = Join-Path $dataDir "audit-summary-bundle.zip"
          $chartDir = Join-Path $dataDir "_audit_summary_charts"
          $mplConfigDir = Join-Path $dataDir "_matplotlib"

          "VISION360_DATA_DIR=$dataDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AUDIT_EXCEL_PATH=$auditExcelPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AUDIT_ANALYSIS_JSON_PATH=$analysisJsonPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AUDIT_SUMMARY_DOCX_PATH=$docxPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AUDIT_SUMMARY_PDF_PATH=$pdfPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AUDIT_SUMMARY_ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AUDIT_SUMMARY_CHART_DIR=$chartDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MPLCONFIGDIR=$mplConfigDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "[PATH] VISION360_DATA_DIR=$dataDir"
          Write-Host "[PATH] AUDIT_EXCEL_PATH=$auditExcelPath"
          Write-Host "[PATH] AUDIT_ANALYSIS_JSON_PATH=$analysisJsonPath"
          Write-Host "[PATH] AUDIT_SUMMARY_DOCX_PATH=$docxPath"
          Write-Host "[PATH] AUDIT_SUMMARY_PDF_PATH=$pdfPath"
          Write-Host "[PATH] AUDIT_SUMMARY_ZIP_PATH=$zipPath"

      - name: Configure portable paths on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          data_dir="$RUNNER_TEMP/vision360-data"
          {
            echo "VISION360_DATA_DIR=$data_dir"
            echo "AUDIT_EXCEL_PATH=$data_dir/security_audit_requirements.xlsx"
            echo "AUDIT_ANALYSIS_JSON_PATH=$data_dir/audit_summary_analysis_pack.json"
            echo "AUDIT_SUMMARY_DOCX_PATH=$data_dir/Audit Summary.docx"
            echo "AUDIT_SUMMARY_PDF_PATH=$data_dir/Audit Summary.pdf"
            echo "AUDIT_SUMMARY_ZIP_PATH=$data_dir/audit-summary-bundle.zip"
            echo "AUDIT_SUMMARY_CHART_DIR=$data_dir/_audit_summary_charts"
            echo "MPLCONFIGDIR=$data_dir/_matplotlib"
          } >> "$GITHUB_ENV"
          echo "[PATH] VISION360_DATA_DIR=$data_dir"

      - name: Verify Python on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          python --version
          python -c "import sys; print(sys.executable)"
          if (Get-Command py -ErrorAction SilentlyContinue) { py --list }

      - name: Verify Python on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            python3 --version
            python3 -c "import sys; print(sys.executable)"
          else
            python --version
            python -c "import sys; print(sys.executable)"
          fi

      - name: Create clean venv on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path ".venv") { Remove-Item -Recurse -Force ".venv" }
          $pythonVersion = ($env:AI_PYTHON_VERSION + "").Trim()
          if (-not [string]::IsNullOrWhiteSpace($pythonVersion) -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py -$pythonVersion -m venv .venv
          } else {
            python -m venv .venv
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $pythonExe = (Resolve-Path ".\.venv\Scripts\python.exe").Path
          "PYTHON_EXE=$pythonExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          & $pythonExe --version

      - name: Create clean venv on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .venv
          python_version="${AI_PYTHON_VERSION:-}"
          if [ -n "$python_version" ] && command -v "python$python_version" >/dev/null 2>&1; then
            "python$python_version" -m venv .venv
          elif command -v python3 >/dev/null 2>&1; then
            python3 -m venv .venv
          else
            python -m venv .venv
          fi
          echo "PYTHON_EXE=$PWD/.venv/bin/python" >> "$GITHUB_ENV"
          "$PWD/.venv/bin/python" --version

      - name: Install Python dependencies on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          function Invoke-PipInstall {
            param([Parameter(Mandatory = $true)][string[]] $PipArgs, [int] $MaxAttempts = 3)
            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              Write-Host ("[PIP] Attempt {0}/{1}: python -m pip {2}" -f $attempt, $MaxAttempts, ($PipArgs -join ' '))
              & $env:PYTHON_EXE -m pip @PipArgs
              if ($LASTEXITCODE -eq 0) { return }
              if ($attempt -lt $MaxAttempts) { Start-Sleep -Seconds (10 * $attempt) }
            }
            throw ("pip install failed after {0} attempts: {1}" -f $MaxAttempts, ($PipArgs -join ' '))
          }
          Invoke-PipInstall -PipArgs @("install", "--upgrade", "pip", "--retries", "10", "--timeout", "120")
          Invoke-PipInstall -PipArgs @("install", "--retries", "10", "--timeout", "120", "--prefer-binary", "--force-reinstall", "-r", "requirements/ai-runtime.txt")
          Invoke-PipInstall -PipArgs @("install", "--retries", "10", "--timeout", "120", "--prefer-binary", "pandas", "openpyxl", "python-docx", "matplotlib")
          & $env:PYTHON_EXE -m pip check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install Python dependencies on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pip_install() {
            local attempt
            for attempt in 1 2 3; do
              echo "[PIP] Attempt $attempt/3: python -m pip $*"
              if "$PYTHON_EXE" -m pip "$@"; then return 0; fi
              if [ "$attempt" -lt 3 ]; then sleep $((10 * attempt)); fi
            done
            echo "[PIP] pip install failed after 3 attempts: $*" >&2
            return 1
          }
          pip_install install --upgrade pip --retries 10 --timeout 120
          pip_install install --retries 10 --timeout 120 --prefer-binary --force-reinstall -r requirements/ai-runtime.txt
          pip_install install --retries 10 --timeout 120 --prefer-binary pandas openpyxl python-docx matplotlib
          "$PYTHON_EXE" -m pip check

      - name: Resolve AI config on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & $env:PYTHON_EXE scripts/resolve_ai_config.py --task "$env:AI_TASK" --github-env "$env:GITHUB_ENV"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Resolve AI config on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          "$PYTHON_EXE" scripts/resolve_ai_config.py --task "$AI_TASK" --github-env "$GITHUB_ENV"

      - name: Show resolved AI route on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "[AI] AI_TASK=$env:AI_TASK"
          Write-Host "[AI] AI_PROFILE=$env:AI_PROFILE"
          Write-Host "[AI] AI_PROVIDER=$env:AI_PROVIDER"
          Write-Host "[AI] AI_MODEL=$env:AI_MODEL"
          Write-Host "[AI] AI_API_BASE=$env:AI_API_BASE"
          Write-Host "[AI] AI_KEY_PRESENT=$env:AI_KEY_PRESENT"
          if ([string]::IsNullOrWhiteSpace($env:OPENAI_API_KEY)) { throw "OPENAI_API_KEY is empty." }

      - name: Show resolved AI route on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "[AI] AI_TASK=${AI_TASK:-}"
          echo "[AI] AI_PROFILE=${AI_PROFILE:-}"
          echo "[AI] AI_PROVIDER=${AI_PROVIDER:-}"
          echo "[AI] AI_MODEL=${AI_MODEL:-}"
          echo "[AI] AI_API_BASE=${AI_API_BASE:-}"
          echo "[AI] AI_KEY_PRESENT=${AI_KEY_PRESENT:-}"
          if [ -z "${OPENAI_API_KEY:-}" ]; then echo "OPENAI_API_KEY is empty." >&2; exit 1; fi

      - name: Verify AI runtime route on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $env:PYTHONPATH = Join-Path $PWD "scripts"
          $py = @'
          from lib.ai_runtime import AIRuntime, OpenAI, completion
          rt = AIRuntime(task="audit_summary_docx")
          print("[AI_RUNTIME] provider:", rt.provider)
          print("[AI_RUNTIME] model:", rt.model)
          print("[AI_RUNTIME] api_base:", rt.api_base)
          print("[AI_RUNTIME] OpenAI SDK available:", OpenAI is not None)
          print("[AI_RUNTIME] LiteLLM available:", completion is not None)
          print("[AI_RUNTIME] uses direct OpenAI route:", rt._use_direct_openai())
          if rt.provider == "openai_compatible" and not rt._use_direct_openai():
              raise SystemExit("openai_compatible provider must use direct OpenAI SDK route")
          '@
          $py | & $env:PYTHON_EXE -
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify AI runtime route on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          set -euo pipefail
          "$PYTHON_EXE" - <<'PY'
          from lib.ai_runtime import AIRuntime, OpenAI, completion
          rt = AIRuntime(task="audit_summary_docx")
          print("[AI_RUNTIME] provider:", rt.provider)
          print("[AI_RUNTIME] model:", rt.model)
          print("[AI_RUNTIME] api_base:", rt.api_base)
          print("[AI_RUNTIME] OpenAI SDK available:", OpenAI is not None)
          print("[AI_RUNTIME] LiteLLM available:", completion is not None)
          print("[AI_RUNTIME] uses direct OpenAI route:", rt._use_direct_openai())
          if rt.provider == "openai_compatible" and not rt._use_direct_openai():
              raise SystemExit("openai_compatible provider must use direct OpenAI SDK route")
          PY

      - name: Prepare portable data dir on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path $env:VISION360_DATA_DIR | Out-Null
          New-Item -ItemType Directory -Force -Path $env:AUDIT_SUMMARY_CHART_DIR | Out-Null
          New-Item -ItemType Directory -Force -Path $env:MPLCONFIGDIR | Out-Null
          foreach ($filePath in @($env:AUDIT_ANALYSIS_JSON_PATH, $env:AUDIT_SUMMARY_DOCX_PATH, $env:AUDIT_SUMMARY_PDF_PATH, $env:AUDIT_SUMMARY_ZIP_PATH)) {
            if (Test-Path $filePath) { Remove-Item -Force $filePath }
          }

      - name: Prepare portable data dir on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$VISION360_DATA_DIR" "$AUDIT_SUMMARY_CHART_DIR" "$MPLCONFIGDIR"
          rm -f "$AUDIT_ANALYSIS_JSON_PATH" "$AUDIT_SUMMARY_DOCX_PATH" "$AUDIT_SUMMARY_PDF_PATH" "$AUDIT_SUMMARY_ZIP_PATH"

      - name: Download security-audit-excel artifact
        uses: actions/download-artifact@v6
        with:
          name: security-audit-excel
          path: ${{ runner.temp }}/vision360-data

      - name: Build analysis pack JSON on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "[NO-AI] Building analysis pack JSON from Excel."
          & $env:PYTHON_EXE scripts/audit_summary_stage1_build_analysis_pack.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path $env:AUDIT_ANALYSIS_JSON_PATH)) { throw "audit_summary_analysis_pack.json was not created" }

      - name: Build analysis pack JSON on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "[NO-AI] Building analysis pack JSON from Excel."
          "$PYTHON_EXE" scripts/audit_summary_stage1_build_analysis_pack.py
          test -f "$AUDIT_ANALYSIS_JSON_PATH"

      - name: Generate Audit Summary DOCX using AI on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "[AI] Generating Audit Summary DOCX."
          & $env:PYTHON_EXE scripts/audit_summary_stage2_generate_docx.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path $env:AUDIT_SUMMARY_DOCX_PATH)) { throw "Audit Summary.docx was not created" }

      - name: Generate Audit Summary DOCX using AI on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "[AI] Generating Audit Summary DOCX."
          "$PYTHON_EXE" scripts/audit_summary_stage2_generate_docx.py
          test -f "$AUDIT_SUMMARY_DOCX_PATH"

      - name: Locate LibreOffice on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $candidates = @()
          $cmd = Get-Command soffice.exe -ErrorAction SilentlyContinue
          if ($cmd) { $candidates += $cmd.Source }
          $cmd = Get-Command libreoffice.exe -ErrorAction SilentlyContinue
          if ($cmd) { $candidates += $cmd.Source }
          $candidates += @(
            "C:\Program Files\LibreOffice\program\soffice.exe",
            "C:\Program Files (x86)\LibreOffice\program\soffice.exe"
          )
          $office = $candidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $office) { throw "LibreOffice was not found. Install LibreOffice on the self-hosted runner or add soffice.exe to PATH." }
          "LIBREOFFICE_EXE=$office" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "[PDF] LibreOffice executable: $office"

      - name: Ensure LibreOffice on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if command -v libreoffice >/dev/null 2>&1; then
            office="$(command -v libreoffice)"
          elif command -v soffice >/dev/null 2>&1; then
            office="$(command -v soffice)"
          elif command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y libreoffice zip
            office="$(command -v libreoffice)"
          else
            echo "LibreOffice was not found. Install LibreOffice or add soffice/libreoffice to PATH." >&2
            exit 1
          fi
          echo "LIBREOFFICE_EXE=$office" >> "$GITHUB_ENV"
          echo "[PDF] LibreOffice executable: $office"

      - name: Convert DOCX to PDF on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & $env:LIBREOFFICE_EXE --headless --convert-to pdf --outdir $env:VISION360_DATA_DIR $env:AUDIT_SUMMARY_DOCX_PATH
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path $env:AUDIT_SUMMARY_PDF_PATH)) { throw "Audit Summary.pdf was not created" }

      - name: Convert DOCX to PDF on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          "$LIBREOFFICE_EXE" --headless --convert-to pdf --outdir "$VISION360_DATA_DIR" "$AUDIT_SUMMARY_DOCX_PATH"
          test -f "$AUDIT_SUMMARY_PDF_PATH"

      - name: Create ZIP bundle on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path $env:AUDIT_SUMMARY_ZIP_PATH) { Remove-Item -Force $env:AUDIT_SUMMARY_ZIP_PATH }
          Compress-Archive -LiteralPath @($env:AUDIT_SUMMARY_DOCX_PATH, $env:AUDIT_SUMMARY_PDF_PATH) -DestinationPath $env:AUDIT_SUMMARY_ZIP_PATH -Force
          if (-not (Test-Path $env:AUDIT_SUMMARY_ZIP_PATH)) { throw "audit-summary-bundle.zip was not created" }

      - name: Create ZIP bundle on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd "$VISION360_DATA_DIR"
          if ! command -v zip >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y zip
            else
              echo "zip command was not found." >&2
              exit 1
            fi
          fi
          zip -j "audit-summary-bundle.zip" "Audit Summary.docx" "Audit Summary.pdf"
          test -f "$AUDIT_SUMMARY_ZIP_PATH"

      - name: Upload Audit Summary outputs
        uses: actions/upload-artifact@v6
        with:
          name: audit-summary-zip
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/vision360-data/Audit Summary.docx
            ${{ runner.temp }}/vision360-data/Audit Summary.pdf
